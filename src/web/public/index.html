<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twoine - Gestion de projets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {

                    colors: {

                            500: '#737373',
                            600: '#525252',
                            700: '#404040',
                            800: '#262626',

                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f5f5f5; }

        ::-webkit-scrollbar-thumb:hover { background: #a3a3a3; }

        /* Mobile Sidebar Overlay */

        @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
        .sidebar-slide { animation: slideIn 0.3s ease-out; }

        /* Mobile table scroll */

</head>
<body class="h-full bg-gray-50 text-gray-900">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ============================================
        // API Helper
        // ============================================
        function getAuthHeaders() {
            try {
                const saved = localStorage.getItem('websftp_user');
                if (!saved) return {};
                const user = JSON.parse(saved);
                if (!user?.id) return {};
                return { 'x-twoine-user-id': user.id };
            } catch {
                return {};
            }
        }

        const api = {
            async get(url) {
                const res = await fetch(url, { headers: getAuthHeaders() });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`Erreur HTTP ${res.status}: ${text.substring(0, 100)}`);
                }
                const contentType = res.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('La rÃ©ponse du serveur n\'est pas au format JSON');
                }
                return res.json();
            },
            async post(url, data = {}) {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`Erreur HTTP ${res.status}: ${text.substring(0, 100)}`);
                }
                const contentType = res.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('La rÃ©ponse du serveur n\'est pas au format JSON');
                }
                return res.json();
            },
            async put(url, data = {}) {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`Erreur HTTP ${res.status}: ${text.substring(0, 100)}`);
                }
                const contentType = res.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('La rÃ©ponse du serveur n\'est pas au format JSON');
                }
                return res.json();
            },
            async del(url) {
                const res = await fetch(url, { method: 'DELETE', headers: getAuthHeaders() });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`Erreur HTTP ${res.status}: ${text.substring(0, 100)}`);
                }
                const contentType = res.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('La rÃ©ponse du serveur n\'est pas au format JSON');
                }
                return res.json();
            }
        };

        // ============================================
        // Icon Component
        // ============================================
        function Icon({ name, size = 18, className = '' }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = '';
                    // Convertir kebab-case en PascalCase pour Lucide
                    const iconName = name.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join('');
                    const iconElement = lucide.icons[iconName];
                    if (iconElement) {
                        const el = lucide.createElement(iconElement);
                        el.setAttribute('width', size);
                        el.setAttribute('height', size);
                        if (className) {
                            className.split(' ').forEach(c => { if(c) el.classList.add(c); });
                        }
                        ref.current.appendChild(el);
                    }
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center" />;
        }

        // ============================================
        // Toast Notification
        // ============================================
        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, []);

            const colors = {
                success: 'bg-emerald-50 border-emerald-200 text-emerald-700',
                error: 'bg-red-50 border-red-200 text-red-700',
                info: 'bg-blue-50 border-blue-200 text-blue-700'
            };

            return (
                <div className={`fixed top-4 right-4 left-4 sm:left-auto sm:right-4 z-50 px-4 py-3 rounded-lg border ${colors[type]} fade-in flex items-center gap-2 shadow-lg max-w-md mx-auto sm:mx-0`}>
                    <Icon name={type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'} size={16} />
                    <span className="text-sm font-medium flex-1">{message}</span>
                    <button onClick={onClose} className="ml-2 opacity-60 hover:opacity-100 shrink-0">
                        <Icon name="x" size={14} />
                    </button>
                </div>
            );
        }

        // ============================================
        // Modal
        // ============================================
        function Modal({ title, children, onClose, wide = false }) {
            const mouseDownTarget = useRef(null);
            return (
                <div
                    className="fixed inset-0 z-40 flex items-center justify-center bg-black/40 backdrop-blur-sm fade-in"
                    onMouseDown={e => { mouseDownTarget.current = e.target; }}
                    onMouseUp={e => { if (mouseDownTarget.current === e.currentTarget && e.target === e.currentTarget) onClose(); }}
                >
                    <div className={`bg-white border border-gray-200 rounded-xl shadow-2xl ${wide ? 'w-full max-w-3xl' : 'w-full max-w-lg'} max-h-[90vh] overflow-y-auto mx-4`} onMouseDown={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-4 sm:px-6 py-3 sm:py-4 border-b border-gray-200">
                            <h2 className="text-base sm:text-lg font-semibold text-gray-900">{title}</h2>
                            <button onClick={onClose} className="p-1 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors shrink-0">
                                <Icon name="x" size={20} />
                            </button>
                        </div>
                        <div className="p-4 sm:p-6">{children}</div>
                    </div>
                </div>
            );
        }

        // ============================================
        // Confirm Dialog
        // ============================================
        function ConfirmDialog({ title, message, onConfirm, onCancel, danger = false }) {
            return (
                <Modal title={title} onClose={onCancel}>
                    <p className="text-gray-600 mb-6">{message}</p>
                    <div className="flex justify-end gap-3">
                        <button onClick={onCancel} className="px-4 py-2 rounded-lg bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 transition-colors">
                            Annuler
                        </button>
                        <button onClick={onConfirm} className={`px-4 py-2 rounded-lg text-white transition-colors ${danger ? 'bg-red-600 hover:bg-red-700' : 'bg-primary-600 hover:bg-primary-700'}`}>
                            Confirmer
                        </button>
                    </div>
                </Modal>
            );
        }

        // ============================================
        // Export Modal
        // ============================================
        function ExportModal({ onClose, showToast, currentUser }) {
            const [loading, setLoading] = useState(false);
            const [selectedData, setSelectedData] = useState({
                projects: true,
                databases: true,
                nginx: true,
                ssl: true,
                apiKeys: true,
                users: currentUser?.role === 'admin',
                includeProjectFiles: false
            });

            const handleToggle = (key) => {
                setSelectedData(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const handleExport = async () => {
                setLoading(true);
                try {
                    // Envoyer une requÃªte POST avec les sÃ©lections
                    const result = await api.post('/api/export', selectedData);
                    
                    if (!result.success) {
                        throw new Error(result.error || 'Erreur lors de l\'export');
                    }

                    const blob = new Blob([JSON.stringify(result.data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `twoine-export-${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    showToast('Export rÃ©ussi', 'success');
                    onClose();
                } catch (error) {
                    showToast(error.message || 'Erreur lors de l\'export', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const isAdmin = currentUser?.role === 'admin';

            return (
                <Modal title="Exporter les donnÃ©es" onClose={onClose}>
                    <div className="space-y-4">
                        <p className="text-sm text-gray-600">SÃ©lectionnez les donnÃ©es Ã  exporter :</p>
                        
                        <div className="space-y-2">
                            <label className="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors">
                                <input
                                    type="checkbox"
                                    checked={selectedData.projects}
                                    onChange={() => handleToggle('projects')}
                                    className="w-4 h-4 text-primary-600 rounded focus:ring-2 focus:ring-primary-500"
                                />
                                <div className="flex items-center gap-2 flex-1">
                                    <Icon name="folder-open" size={18} className="text-gray-500" />
                                    <span className="text-sm font-medium text-gray-700">Projets</span>
                                </div>
                            </label>

                            {selectedData.projects && (
                                <label className="flex items-center gap-3 p-3 ml-6 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors bg-gray-50">
                                    <input
                                        type="checkbox"
                                        checked={selectedData.includeProjectFiles}
                                        onChange={() => handleToggle('includeProjectFiles')}
                                        className="w-4 h-4 text-primary-600 rounded focus:ring-2 focus:ring-primary-500"
                                    />
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2">
                                            <Icon name="file" size={16} className="text-gray-500" />
                                            <span className="text-sm font-medium text-gray-700">Inclure les fichiers des projets</span>
                                        </div>
                                        <p className="text-xs text-gray-500 mt-1">âš ï¸ Peut Ãªtre trÃ¨s lent pour les gros projets (timeout possible)</p>
                                    </div>
                                </label>
                            )}

                            <label className="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors">
                                <input
                                    type="checkbox"
                                    checked={selectedData.databases}
                                    onChange={() => handleToggle('databases')}
                                    className="w-4 h-4 text-primary-600 rounded focus:ring-2 focus:ring-primary-500"
                                />
                                <div className="flex items-center gap-2 flex-1">
                                    <Icon name="database" size={18} className="text-gray-500" />
                                    <span className="text-sm font-medium text-gray-700">Bases de donnÃ©es</span>
                                </div>
                            </label>

                            <label className="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors">
                                <input
                                    type="checkbox"
                                    checked={selectedData.nginx}
                                    onChange={() => handleToggle('nginx')}
                                    className="w-4 h-4 text-primary-600 rounded focus:ring-2 focus:ring-primary-500"
                                />
                                <div className="flex items-center gap-2 flex-1">
                                    <Icon name="server" size={18} className="text-gray-500" />
                                    <span className="text-sm font-medium text-gray-700">Nginx</span>
                                </div>
                            </label>

                            <label className="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors">
                                <input
                                    type="checkbox"
                                    checked={selectedData.ssl}
                                    onChange={() => handleToggle('ssl')}
                                    className="w-4 h-4 text-primary-600 rounded focus:ring-2 focus:ring-primary-500"
                                />
                                <div className="flex items-center gap-2 flex-1">
                                    <Icon name="shield" size={18} className="text-gray-500" />
                                    <span className="text-sm font-medium text-gray-700">SSL / Certificats</span>
                                </div>
                            </label>

                            <label className="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors">
                                <input
                                    type="checkbox"
                                    checked={selectedData.apiKeys}
                                    onChange={() => handleToggle('apiKeys')}
                                    className="w-4 h-4 text-primary-600 rounded focus:ring-2 focus:ring-primary-500"
                                />
                                <div className="flex items-center gap-2 flex-1">
                                    <Icon name="key" size={18} className="text-gray-500" />
                                    <span className="text-sm font-medium text-gray-700">ClÃ©s API</span>
                                </div>
                            </label>

                            {isAdmin && (
                                <label className="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors">
                                    <input
                                        type="checkbox"
                                        checked={selectedData.users}
                                        onChange={() => handleToggle('users')}
                                        className="w-4 h-4 text-primary-600 rounded focus:ring-2 focus:ring-primary-500"
                                    />
                                    <div className="flex items-center gap-2 flex-1">
                                        <Icon name="users" size={18} className="text-gray-500" />
                                        <span className="text-sm font-medium text-gray-700">Utilisateurs</span>
                                    </div>
                                </label>
                            )}
                        </div>

                        <div className="flex justify-end gap-3 pt-4">
                            <button
                                onClick={onClose}
                                className="px-4 py-2 rounded-lg bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 transition-colors"
                                disabled={loading}
                            >
                                Annuler
                            </button>
                            <button
                                onClick={handleExport}
                                disabled={loading || !Object.values(selectedData).some(v => v)}
                                className="px-4 py-2 rounded-lg bg-primary-600 hover:bg-primary-700 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                            >
                                {loading ? (
                                    <>
                                        <Icon name="loader" size={16} className="animate-spin" />
                                        <span>Export...</span>
                                    </>
                                ) : (
                                    <>
                                        <Icon name="download" size={16} />
                                        <span>Exporter</span>
                                    </>
                                )}
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        }

        // ============================================
        // Import Modal
        // ============================================
        function ImportModal({ onClose, showToast, onSuccess }) {
            const [loading, setLoading] = useState(false);
            const [dragActive, setDragActive] = useState(false);
            const [file, setFile] = useState(null);
            const fileInputRef = useRef(null);

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') {
                    setDragActive(true);
                } else if (e.type === 'dragleave') {
                    setDragActive(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleFile(e.dataTransfer.files[0]);
                }
            };

            const handleChange = (e) => {
                e.preventDefault();
                if (e.target.files && e.target.files[0]) {
                    handleFile(e.target.files[0]);
                }
            };

            const handleFile = (selectedFile) => {
                if (selectedFile.type !== 'application/json') {
                    showToast('Le fichier doit Ãªtre au format JSON', 'error');
                    return;
                }
                setFile(selectedFile);
            };

            const handleImport = async () => {
                if (!file) return;
                
                setLoading(true);
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);

                    const result = await api.post('/api/import', data);
                    if (result.success) {
                        showToast('Import rÃ©ussi', 'success');
                        onClose();
                        if (onSuccess) onSuccess();
                    } else {
                        throw new Error(result.error || 'Erreur lors de l\'import');
                    }
                } catch (error) {
                    if (error instanceof SyntaxError) {
                        showToast('Fichier JSON invalide', 'error');
                    } else {
                        showToast(error.message || 'Erreur lors de l\'import', 'error');
                    }
                } finally {
                    setLoading(false);
                }
            };

            return (
                <Modal title="Importer des donnÃ©es" onClose={onClose}>
                    <div className="space-y-4">
                        <p className="text-sm text-gray-600">Importez un fichier JSON d'export Twoine :</p>
                        
                        <div
                            className={`relative border-2 border-dashed rounded-lg p-8 text-center transition-colors ${
                                dragActive 
                                    ? 'border-primary-500 bg-primary-50' 
                                    : file 
                                        ? 'border-green-500 bg-green-50'
                                        : 'border-gray-300 hover:border-gray-400'
                            }`}
                            onDragEnter={handleDrag}
                            onDragLeave={handleDrag}
                            onDragOver={handleDrag}
                            onDrop={handleDrop}
                        >
                            <input
                                ref={fileInputRef}
                                type="file"
                                accept=".json,application/json"
                                onChange={handleChange}
                                className="hidden"
                            />
                            
                            {file ? (
                                <div className="space-y-3">
                                    <Icon name="file-check" size={48} className="mx-auto text-green-600" />
                                    <div>
                                        <p className="text-sm font-medium text-gray-900">{file.name}</p>
                                        <p className="text-xs text-gray-500 mt-1">{(file.size / 1024).toFixed(2)} KB</p>
                                    </div>
                                    <button
                                        onClick={() => setFile(null)}
                                        className="text-sm text-red-600 hover:text-red-700 font-medium"
                                    >
                                        Supprimer
                                    </button>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    <Icon name="upload" size={48} className="mx-auto text-gray-400" />
                                    <div>
                                        <p className="text-sm font-medium text-gray-700">
                                            Glissez-dÃ©posez votre fichier ici
                                        </p>
                                        <p className="text-xs text-gray-500 mt-1">ou</p>
                                    </div>
                                    <button
                                        onClick={() => fileInputRef.current?.click()}
                                        className="px-4 py-2 rounded-lg bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 transition-colors text-sm font-medium"
                                    >
                                        Parcourir les fichiers
                                    </button>
                                    <p className="text-xs text-gray-400 mt-2">Format JSON uniquement</p>
                                </div>
                            )}
                        </div>

                        <div className="flex justify-end gap-3 pt-4">
                            <button
                                onClick={onClose}
                                className="px-4 py-2 rounded-lg bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 transition-colors"
                                disabled={loading}
                            >
                                Annuler
                            </button>
                            <button
                                onClick={handleImport}
                                disabled={loading || !file}
                                className="px-4 py-2 rounded-lg bg-primary-600 hover:bg-primary-700 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                            >
                                {loading ? (
                                    <>
                                        <Icon name="loader" size={16} className="animate-spin" />
                                        <span>Import...</span>
                                    </>
                                ) : (
                                    <>
                                        <Icon name="upload" size={16} />
                                        <span>Importer</span>
                                    </>
                                )}
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        }

        // ============================================
        // Status Badge
        // ============================================
        function StatusBadge({ status }) {
            const isOnline = status === 'online';
            return (
                <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${isOnline ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-gray-100 text-gray-600 border border-gray-200'}`}>
                    <span className={`w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-emerald-500 pulse-dot' : 'bg-gray-400'}`}></span>
                    {isOnline ? 'En ligne' : 'ArrÃªtÃ©'}
                </span>
            );
        }

        // ============================================
        // Sidebar
        // ============================================
        function Sidebar({ currentPage, onNavigate, projectCount, currentUser, onLogout, isOpen, onClose, onExport, onImport }) {
            const isAdmin = currentUser?.role === 'admin';
            
            const links = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Tableau de bord' },
                { id: 'projects', icon: 'folder-open', label: 'Projets' },
                { id: 'databases', icon: 'database', label: 'Bases de donnÃ©es' },
                { id: 'nginx', icon: 'globe', label: 'Nginx' },
                { id: 'ssl', icon: 'shield', label: 'SSL' },
                { id: 'api-keys', icon: 'key', label: 'ClÃ©s API' },
                ...(isAdmin ? [
                    { id: 'ai-models', icon: 'brain', label: 'ModÃ¨les IA' },
                    { id: 'users', icon: 'users', label: 'Utilisateurs' },
                    { id: 'pm2', icon: 'activity', label: 'Statut PM2' },
                ] : []),
            ];

            function handleNavigate(page) {
                onNavigate(page);
                if (onClose) onClose();
            }

            return (
                <>
                    {/* Mobile overlay */}
                    {isOpen && (
                        <div 
                            className="fixed inset-0 bg-black/40 z-40 lg:hidden sidebar-overlay"
                            onClick={onClose}
                        />
                    )}
                    
                    {/* Sidebar */}
                    <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 flex flex-col h-full transform transition-transform duration-300 lg:transform-none ${
                        isOpen ? 'translate-x-0 sidebar-slide' : '-translate-x-full lg:translate-x-0'

        /**
         * Config Nginx affichÃ©e pour un service : uniquement celle liÃ©e Ã  ce service (pas tout le projet).
         */
        function nginxConfigBelongsToService(config, projectName, serviceName) {
            if (config.linkedProject && config.linkedService) {
                return config.linkedProject === projectName && config.linkedService === serviceName;
            }
            const expected = `${projectName} - ${serviceName}`;
            return (config.description || '').trim() === expected;
        }

        /** Toutes les configs Nginx rattachÃ©es Ã  un projet (rÃ©cap onglet projet). */
        function nginxConfigsForProject(allConfigs, projectName) {
            const prefix = `${projectName} - `;
            return (allConfigs || []).filter(c =>
                c.linkedProject === projectName ||
                (!c.linkedProject && (c.description || '').startsWith(prefix))
            );
        }

                        api.get('/api/ssl/certificates'),
                        api.get('/api/ssl/templates')
                    ]);
                    if (certsResult.success) setSslCertificates(certsResult.data);

                            nginxSslKeyPath: result.data.keyPath,

                    } else {

                    showToast(error.message, 'error');
                } finally {
                    setGeneratingCert(false);

                const cert = sslCertificates.find(c => c.id === certId);

            const [selectedItems, setSelectedItems] = useState([]);

            const [deleteMultiConfirm, setDeleteMultiConfirm] = useState(false);
            const [clipboard, setClipboard] = useState(null);
            const [isDragOver, setIsDragOver] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(null);
            const dropZoneRef = useRef(null);

            const loadFiles = useCallback(async (path = '') => {
                setLoading(true);
                const result = await api.get(`/api/projects/${projectName}/files?path=${encodeURIComponent(path)}`);
                if (result.success) {
                    setFiles(result.data || []);
                    setCurrentPath(result.currentPath || '');
                }
                setLoading(false);
            }, [projectName]);

            useEffect(() => { loadFiles(currentPath); }, [loadFiles, currentPath]);

            function navigateToPath(path) {
                setCurrentPath(path);
                setSelectedItems([]);
            }

            function goUp() {
                const parts = currentPath.split('/').filter(p => p);
                parts.pop();
                navigateToPath(parts.join('/'));
            }

            function toggleSelect(file, e) {
                e.stopPropagation();
                const path = file.path;
                setSelectedItems(prev => prev.includes(path) ? prev.filter(p => p !== path) : [...prev, path]);
            }

            function toggleSelectAll() {
                setSelectedItems(selectedItems.length === files.length && files.length > 0 ? [] : files.map(f => f.path));
            }

            async function handleDelete() {
                if (!deleteTarget) return;
                const result = await api.del(`/api/projects/${projectName}/files?path=${encodeURIComponent(deleteTarget.path)}`);
                showToast(result.success ? `${deleteTarget.name} supprimÃ©` : result.error, result.success ? 'success' : 'error');
                setDeleteTarget(null);
                loadFiles(currentPath);
            }

            async function handleDeleteSelected() {
                let errors = 0;
                for (const itemPath of selectedItems) {
                    const result = await api.del(`/api/projects/${projectName}/files?path=${encodeURIComponent(itemPath)}`);
                    if (!result.success) errors++;
                }
                showToast(errors === 0 ? `${selectedItems.length} Ã©lÃ©ment(s) supprimÃ©(s)` : `${selectedItems.length - errors} supprimÃ©(s), ${errors} erreur(s)`, errors === 0 ? 'success' : 'error');
                setSelectedItems([]);
                setDeleteMultiConfirm(false);
                loadFiles(currentPath);
            }

            function handleCopySelected() {
                setClipboard({ items: [...selectedItems] });
                showToast(`${selectedItems.length} Ã©lÃ©ment(s) copiÃ©(s)`, 'info');
            }

            async function handlePaste() {
                if (!clipboard) return;
                let errors = 0;
                for (const itemPath of clipboard.items) {
                    const name = itemPath.split('/').pop();
                    const destPath = currentPath ? `${currentPath}/${name}` : name;
                    const result = await api.post(`/api/projects/${projectName}/files/copy`, { sourcePath: itemPath, destPath });
                    if (!result.success) errors++;
                }
                showToast(errors === 0 ? `${clipboard.items.length} Ã©lÃ©ment(s) collÃ©(s)` : `Erreur lors du collage`, errors === 0 ? 'success' : 'error');
                loadFiles(currentPath);

            function handleDownload(file) {
                window.open(`/api/projects/${projectName}/files/download?path=${encodeURIComponent(file.path)}`, '_blank');
            }

            async function uploadEntriesWithProgress(allEntries) {
                if (allEntries.length === 0) return;
                const total = allEntries.length;
                setUploadProgress({ current: 0, total, percent: 0, filename: `PrÃ©paration de ${total} fichier(s)...` });
                
                const formData = new FormData();
                formData.append('path', currentPath);
                
                allEntries.forEach(({ file, relativePath }, index) => {
                    formData.append('files', file);
                    formData.append(`relativePath_${index}`, relativePath);
                });
                
                setUploadProgress({ current: 0, total, percent: 50, filename: `Upload de ${total} fichier(s) en cours...` });
                
                try {
                    await fetch(`/api/projects/${projectName}/files/upload`, { method: 'POST', body: formData });
                    setUploadProgress(null);
                    showToast(`${total} fichier(s) uploadÃ©(s)`, 'success');
                } catch (error) {
                    setUploadProgress(null);
                    showToast(`Erreur lors de l'upload`, 'error');
                }
                
                loadFiles(currentPath);
            }

            async function collectEntry(entry, prefix) {
                if (entry.isFile) {
                    return new Promise(resolve => entry.file(f => resolve([{ file: f, relativePath: prefix ? `${prefix}/${f.name}` : f.name }])));
                }
                if (entry.isDirectory) {
                    const reader = entry.createReader();
                    const dirPrefix = prefix ? `${prefix}/${entry.name}` : entry.name;
                    return new Promise(resolve => {
                        const results = [];
                        function readBatch() {
                            reader.readEntries(async entries => {
                                if (entries.length === 0) { resolve(results); return; }
                                for (const e of entries) { results.push(...(await collectEntry(e, dirPrefix))); }
                                readBatch();
                            });
                        }
                        readBatch();
                    });
                }
                return [];
            }

            async function onDrop(e) {
                e.preventDefault();

                setIsDragOver(false);
                const items = Array.from(e.dataTransfer.items);

                }
                await uploadEntriesWithProgress(allEntries);

        // Upload File Modal
        function UploadFileModal({ projectName, currentPath, onClose, onSuccess, showToast, uploadEntriesWithProgress }) {
            const [uploadMode, setUploadMode] = useState('files');
            const [selectedFiles, setSelectedFiles] = useState([]);
            const [progress, setProgress] = useState(null);
            const fileInputRef = useRef(null);
            const folderInputRef = useRef(null);

            function handleFileSelection(e) {
                setSelectedFiles(Array.from(e.target.files));
            }

            async function handleUpload(e) {
                e.preventDefault();
                if (selectedFiles.length === 0) return;

                const entries = selectedFiles.map(file => ({
                    file,
                    relativePath: (uploadMode === 'folder' && file.webkitRelativePath) ? file.webkitRelativePath : file.name
                }));

                let done = 0;
                const total = entries.length;
                setProgress({ current: 0, total, percent: 0, filename: '' });

                for (const { file, relativePath } of entries) {
                    setProgress({ current: done, total, percent: Math.round((done / total) * 100), filename: relativePath });
                    const formData = new FormData();
                    formData.append('path', currentPath);
                    formData.append('files', file);
                    formData.append('relativePath_0', relativePath);
                    try { await fetch(`/api/projects/${projectName}/files/upload`, { method: 'POST', body: formData }); } catch {}
                    done++;
                }

                setProgress(null);
                showToast(`${done} fichier(s) uploadÃ©(s)`, 'success');
                onSuccess();
            }

            const totalSize = selectedFiles.reduce((sum, f) => sum + f.size, 0);

            return (
                <Modal title="Upload fichiers / dossier" onClose={!progress ? onClose : undefined}>
                    <div className="space-y-4">
                        <div className="flex gap-2">
                            <button type="button" onClick={() => { setUploadMode('files'); setSelectedFiles([]); }}
                                className={`flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors border ${uploadMode === 'files' ? 'bg-primary-600 text-white border-primary-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>

                            </button>
                            <button type="button" onClick={() => { setUploadMode('folder'); setSelectedFiles([]); }}
                                className={`flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors border ${uploadMode === 'folder' ? 'bg-primary-600 text-white border-primary-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>
                                <Icon name="folder" size={14} /> Dossier
                            </button>
                        </div>

                        <div
                            onClick={() => (uploadMode === 'folder' ? folderInputRef : fileInputRef).current?.click()}
                            className="border-2 border-dashed border-gray-300 hover:border-primary-400 rounded-xl p-8 text-center cursor-pointer transition-colors"
                        >
                            <Icon name="upload-cloud" size={36} className="mx-auto mb-2 text-gray-400" />
                            <p className="text-sm text-gray-600 font-medium">
                                {uploadMode === 'folder' ? 'Cliquer pour sÃ©lectionner un dossier' : 'Cliquer pour sÃ©lectionner des fichiers'}
                            </p>
                            <p className="text-xs text-gray-400 mt-1">Ou glissez-dÃ©posez directement dans le gestionnaire</p>
                            <input ref={fileInputRef} type="file" multiple onChange={handleFileSelection} className="hidden" />
                            <input ref={folderInputRef} type="file" webkitdirectory="true" onChange={handleFileSelection} className="hidden" />
                        </div>

                        {selectedFiles.length > 0 && (
                            <div className="bg-gray-50 rounded-lg border border-gray-200 p-3">
                                <p className="text-xs font-medium text-gray-700 mb-2">
                                    {selectedFiles.length} fichier(s) â€” {(totalSize / 1024 / 1024).toFixed(2)} MB

        // ============================================
        // Database Editor Page
        // ============================================
        function DatabaseEditorPage({ databaseId, onNavigate, showToast }) {
            const [database, setDatabase] = useState(null);
            const [tables, setTables] = useState([]);
            const [collections, setCollections] = useState([]);
            const [selectedTable, setSelectedTable] = useState(null);
            const [tableData, setTableData] = useState(null);
            const [tableStructure, setTableStructure] = useState([]);
            const [loading, setLoading] = useState(true);
            const [dataLoading, setDataLoading] = useState(false);
            const [queryText, setQueryText] = useState('');
            const [queryResult, setQueryResult] = useState(null);
            const [queryLoading, setQueryLoading] = useState(false);
            const [page, setPage] = useState(0);
            const [limit] = useState(50);
            const [activeView, setActiveView] = useState('fields');
            const [editingField, setEditingField] = useState(null);
            const [editValues, setEditValues] = useState({});
            const [showAddField, setShowAddField] = useState(false);
            const [newField, setNewField] = useState({ name: '', type: 'VARCHAR(255)', nullable: 'YES', defaultVal: '', extra: '' });
            const [addFieldLoading, setAddFieldLoading] = useState(false);
            const [savingField, setSavingField] = useState(false);
            const [editingDoc, setEditingDoc] = useState(null);
            const [editingDocRaw, setEditingDocRaw] = useState(null);
            const [editDocValues, setEditDocValues] = useState({});
            const [savingDoc, setSavingDoc] = useState(false);
            const [editingRow, setEditingRow] = useState(null);
            const [editRowValues, setEditRowValues] = useState({});
            const [savingRow, setSavingRow] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [deletingItem, setDeletingItem] = useState(false);

            const MYSQL_TYPES = ['INT','BIGINT','TINYINT','SMALLINT','FLOAT','DOUBLE','DECIMAL(10,2)','VARCHAR(50)','VARCHAR(100)','VARCHAR(255)','TEXT','LONGTEXT','CHAR(1)','DATE','DATETIME','TIMESTAMP','BOOLEAN','JSON','BLOB'];

            const loadDatabase = useCallback(async () => {
                const result = await api.get(`/api/databases/${databaseId}`);
                if (result.success) {
                    setDatabase(result.data);
                    if (result.data.type === 'mysql' || result.data.type === 'postgresql') {
                        const tRes = await api.get(`/api/databases/${databaseId}/tables`);
                        if (tRes.success) setTables(tRes.data);
                    } else if (result.data.type === 'mongodb') {
                        const cRes = await api.get(`/api/databases/${databaseId}/collections`);
                        if (cRes.success) setCollections(cRes.data);
                    }
                }
                setLoading(false);
            }, [databaseId]);

            useEffect(() => { loadDatabase(); }, [loadDatabase]);

            const loadTableStructure = async (tableName) => {
                const result = await api.get(`/api/databases/${databaseId}/tables/${tableName}/structure`);
                if (result.success) setTableStructure(result.data);
            };

            const loadTableData = async (tableName, offset = 0) => {
                setDataLoading(true);
                const result = await api.get(`/api/databases/${databaseId}/tables/${tableName}/data?limit=${limit}&offset=${offset}`);
                if (result.success) { setTableData(result.data); setPage(Math.floor(offset / limit)); }
                else showToast(result.error, 'error');
                setDataLoading(false);
            };

            const loadCollectionData = async (collectionName, skip = 0) => {
                setDataLoading(true);
                const result = await api.post(`/api/databases/${databaseId}/collections/${collectionName}/query`, { operation: 'find', query: {}, options: { limit, skip } });
                if (result.success) { setTableData(result.data); setPage(Math.floor(skip / limit)); }
                else showToast(result.error, 'error');
                setDataLoading(false);
            };

            const handleSelectTable = (name) => {
                setSelectedTable(name); setTableData(null); setTableStructure([]); setQueryResult(null); setEditingField(null);
                if (database.type === 'mysql' || database.type === 'postgresql') { setActiveView('fields'); loadTableStructure(name); loadTableData(name); }
                else { setActiveView('data'); loadCollectionData(name); }
            };

            const handleExecuteQuery = async () => {
                if (!queryText.trim()) return;
                setQueryLoading(true); setQueryResult(null);
                if (database.type === 'mysql' || database.type === 'postgresql') {
                    const result = await api.post(`/api/databases/${databaseId}/query`, { query: queryText });
                    if (result.success) { setQueryResult(result.data); showToast('RequÃªte exÃ©cutÃ©e', 'success'); } else showToast(result.error, 'error');
                } else {
                    try {
                        const parsed = JSON.parse(queryText);
                        const result = await api.post(`/api/databases/${databaseId}/collections/${selectedTable || collections[0]}/query`, parsed);
                        if (result.success) { setQueryResult(result.data); showToast('OpÃ©ration exÃ©cutÃ©e', 'success'); } else showToast(result.error, 'error');
                    } catch (e) { showToast('JSON invalide', 'error'); }
                }
                setQueryLoading(false);
            };

            const startEditField = (col) => { setEditingField(col.Field); setEditValues({ type: col.Type, nullable: col.Null, defaultVal: col.Default || '', extra: col.Extra || '' }); };

            const saveFieldEdit = async () => {
                if (!editingField || !selectedTable) return;
                setSavingField(true);
                const nullPart = editValues.nullable === 'NO' ? 'NOT NULL' : 'NULL';
                const defPart = editValues.defaultVal ? ` DEFAULT '${editValues.defaultVal}'` : '';
                const extraPart = editValues.extra ? ` ${editValues.extra}` : '';
                const query = `ALTER TABLE \`${selectedTable}\` MODIFY COLUMN \`${editingField}\` ${editValues.type} ${nullPart}${defPart}${extraPart}`;
                const result = await api.post(`/api/databases/${databaseId}/query`, { query });
                setSavingField(false);
                if (result.success) { showToast(`Champ "${editingField}" modifiÃ©`, 'success'); setEditingField(null); loadTableStructure(selectedTable); }
                else showToast(result.error, 'error');
            };

            const handleAddField = async (e) => {
                e.preventDefault();
                if (!newField.name || !selectedTable) return;
                setAddFieldLoading(true);
                const nullPart = newField.nullable === 'NO' ? 'NOT NULL' : 'NULL';
                const defPart = newField.defaultVal ? ` DEFAULT '${newField.defaultVal}'` : '';
                const extraPart = newField.extra ? ` ${newField.extra}` : '';
                const query = `ALTER TABLE \`${selectedTable}\` ADD COLUMN \`${newField.name}\` ${newField.type} ${nullPart}${defPart}${extraPart}`;
                const result = await api.post(`/api/databases/${databaseId}/query`, { query });
                setAddFieldLoading(false);
                if (result.success) {
                    showToast(`Champ "${newField.name}" ajoutÃ©`, 'success');
                    setShowAddField(false); setNewField({ name: '', type: 'VARCHAR(255)', nullable: 'YES', defaultVal: '', extra: '' });
                    loadTableStructure(selectedTable);
                } else showToast(result.error, 'error');
            };

            const handleDeleteRow = async (row) => {
                setDeletingItem(true);
                const pkField = tableStructure.find(c => c.Key === 'PRI');
                const wherePart = pkField
                    ? `\`${pkField.Field}\` = '${String(row[pkField.Field]).replace(/'/g, "''")}' `
                    : Object.entries(row).map(([k, v]) => v === null ? `\`${k}\` IS NULL` : `\`${k}\` = '${String(v).replace(/'/g, "''")}'`).join(' AND ');
                const result = await api.post(`/api/databases/${databaseId}/query`, { query: `DELETE FROM \`${selectedTable}\` WHERE ${wherePart} LIMIT 1` });
                setDeletingItem(false);
                setConfirmDelete(null);
                if (result.success) { showToast('Ligne supprimÃ©e', 'success'); loadTableData(selectedTable, page * limit); }
                else showToast(result.error, 'error');
            };

            const handleDeleteDoc = async (doc) => {
                setDeletingItem(true);
                const result = await api.post(`/api/databases/${databaseId}/collections/${selectedTable}/query`, {
                    operation: 'deleteOne',
                    query: { _id: doc._id }
                });
                setDeletingItem(false);
                setConfirmDelete(null);
                if (result.success) { showToast('Document supprimÃ©', 'success'); loadCollectionData(selectedTable, page * limit); }
                else showToast(result.error, 'error');
            };

            const startEditRow = (row, idx) => {
                setEditingRow(idx);
                setEditRowValues(Object.fromEntries(Object.entries(row).map(([k, v]) => [k, v === null || v === undefined ? '' : String(v)])));
            };

            const saveMysqlRowEdit = async () => {
                if (editingRow === null || !selectedTable) return;
                setSavingRow(true);
                const originalRow = tableData.rows[editingRow];
                const pkField = tableStructure.find(c => c.Key === 'PRI');
                const setParts = Object.entries(editRowValues)
                    .filter(([k]) => !pkField || k !== pkField.Field)
                    .map(([k, v]) => `\`${k}\` = ${v === '' ? 'NULL' : `'${v.replace(/'/g, "''")}'`}`)
                    .join(', ');
                const wherePart = pkField
                    ? `\`${pkField.Field}\` = '${String(originalRow[pkField.Field]).replace(/'/g, "''")}' `
                    : Object.entries(originalRow).map(([k, v]) => v === null ? `\`${k}\` IS NULL` : `\`${k}\` = '${String(v).replace(/'/g, "''")}'`).join(' AND ');
                const query = `UPDATE \`${selectedTable}\` SET ${setParts} WHERE ${wherePart} LIMIT 1`;
                const result = await api.post(`/api/databases/${databaseId}/query`, { query });
                setSavingRow(false);
                if (result.success) {
                    showToast('Ligne mise Ã  jour', 'success');
                    setEditingRow(null);
                    loadTableData(selectedTable, page * limit);
                } else showToast(result.error, 'error');
            };

            const startEditDoc = (doc) => {
                const { _id, ...rest } = doc;
                const idStr = String(_id?.$oid || _id || '');
                setEditingDoc(idStr);
                setEditingDocRaw(_id);
                setEditDocValues(Object.fromEntries(Object.entries(rest).map(([k, v]) => [k, typeof v === 'object' ? JSON.stringify(v) : String(v ?? '')])));

            const messagesEndRef = useRef(null);

            const loadModels = useCallback(async () => {
                setLoading(true);
                const [statusResult, modelsResult] = await Promise.all([
                    api.get('/api/admin/ai-models/status'),
                    api.get('/api/admin/ai-models')
                ]);
                
                if (statusResult.success) setOllamaRunning(statusResult.data.running);
                if (modelsResult.success) setModels(modelsResult.data);
                setLoading(false);
            }, []);

            const loadAvailableModels = useCallback(async () => {
                const result = await api.get('/api/admin/ai-models/available');
                if (result.success) setAvailableModels(result.data);
            }, []);

            const loadStats = useCallback(async () => {
                const keysResult = await api.get('/api/api-keys');
                
                if (keysResult.success) {
                    const keys = keysResult.data;
                    const allUsage = [];
                    
                    for (const key of keys) {
                        const result = await api.get(`/api/api-keys/${key.id}/usage?limit=10000`);
                        if (result.success) {
                            allUsage.push(...result.data.map(u => ({ ...u, keyName: key.name })));
                        }
                    }

                    const byModel = {};
                    const byEndpoint = { chat: 0, generate: 0 };

                    allUsage.forEach(u => {
                        byModel[u.model] = (byModel[u.model] || 0) + 1;
                        if (u.endpoint === '/api/ai/chat') byEndpoint.chat++;
                        else byEndpoint.generate++;
                    });

                    setStats({
                        total: allUsage.length,
                        byModel,
                        byEndpoint,
                        keys: keys.length
                    });
                }
            }, []);

                loadModels(); 
                loadStats();

                setChatInput('');

                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: selectedModelForChat.name,
                            messages: [...chatMessages, userMessage],
                            stream: false
                        })
                    });

                    if (response.ok) {

                        setChatMessages(prev => [...prev, data.message]);
                    } else {

        function AIChatPage({ showToast }) {
            const [models, setModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [loadingModels, setLoadingModels] = useState(true);
            const messagesEndRef = useRef(null);

            const loadModels = useCallback(async () => {
                const result = await api.get('/api/ai-models');
                if (result.success && result.data.length > 0) {
                    setModels(result.data);
                    setSelectedModel(result.data[0].name);
                }
                setLoadingModels(false);
            }, []);

            useEffect(() => { loadModels(); }, [loadModels]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            async function sendMessage() {
                if (!input.trim() || !selectedModel || loading) return;

                const userMessage = { role: 'user', content: input.trim() };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch('http://localhost:11434/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: selectedModel,
                            messages: [...messages, userMessage],
                            stream: false
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setMessages(prev => [...prev, data.message]);
                    } else {
                        showToast('Erreur lors de l\'envoi du message', 'error');
                    }
                } catch (error) {
                    showToast('Erreur de connexion Ã  Ollama', 'error');
                }

                setLoading(false);
            }

            function clearChat() {
                setMessages([]);
            }

            function handleKeyPress(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            }

            return (
                <div className="fade-in h-full flex flex-col">
                    <div className="flex items-center justify-between mb-6">

                            >
                                {models.map(m => (
                                    <option key={m.name} value={m.name}>{m.name}</option>
                                ))}
                            </select>
                            <button
                                onClick={clearChat}
                                disabled={messages.length === 0}
                                className="flex items-center gap-2 px-4 py-2 rounded-lg bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 transition-colors text-sm disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <Icon name="trash-2" size={15} /> Effacer
                            </button>
                        </div>
                    </div>

                    {loadingModels ? (
                        <div className="flex items-center justify-center h-64">
                            <Icon name="loader-2" size={32} className="animate-spin text-gray-400" />

                    ) : models.length === 0 ? (

                            <Icon name="brain" size={48} className="text-gray-300 mx-auto mb-4" />
                            <p className="text-gray-600 mb-4">Aucun modÃ¨le IA installÃ©</p>
                            <p className="text-sm text-gray-500">Installez un modÃ¨le depuis la page ModÃ¨les IA</p>
                        </div>
                    ) : (

            const [stats, setStats] = useState(null);

            const loadStats = useCallback(async () => {
                setLoading(true);
                const [keysResult, usageResult] = await Promise.all([
                    api.get('/api/api-keys'),
                    api.get('/api/api-keys')
                ]);

                if (keysResult.success) {
                    const keys = keysResult.data;
                    const allUsage = [];
                    
                    for (const key of keys) {
                        const result = await api.get(`/api/api-keys/${key.id}/usage?limit=10000`);
                        if (result.success) {
                            allUsage.push(...result.data.map(u => ({ ...u, keyName: key.name, keyId: key.id })));
                        }
                    }

                    const now = Date.now();
                    const ranges = {
                        '24h': 24 * 60 * 60 * 1000,
                        '7d': 7 * 24 * 60 * 60 * 1000,
                        '30d': 30 * 24 * 60 * 60 * 1000,
                        'all': Infinity
                    };

                    const filteredUsage = allUsage.filter(u => 
                        now - new Date(u.timestamp).getTime() <= ranges[timeRange]
                    );

                    const byKey = {};
                    const byModel = {};
                    const byEndpoint = { chat: 0, generate: 0 };
                    const byDay = {};

                    filteredUsage.forEach(u => {
                        byKey[u.keyName] = (byKey[u.keyName] || 0) + 1;
                        byModel[u.model] = (byModel[u.model] || 0) + 1;
                        
                        if (u.endpoint === '/api/ai/chat') byEndpoint.chat++;
                        else byEndpoint.generate++;

                        const day = new Date(u.timestamp).toLocaleDateString('fr-FR');
                        byDay[day] = (byDay[day] || 0) + 1;
                    });

                    setStats({
                        total: filteredUsage.length,
                        byKey,
                        byModel,
                        byEndpoint,
                        byDay,
                        keys: keys.length
                    });
